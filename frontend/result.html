<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Result - Diabetes Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div id="resultContainer" class="glass-card animate-fade-in text-center">
                    <!-- Dynamic content will be injected here -->
                    <div class="spinner-border text-primary" role="status"></div>
                </div>

                <div class="d-flex justify-content-center gap-3 mt-4 animate-fade-in" style="animation-delay: 0.2s">
                    <a href="index.html" class="btn btn-outline-light">🔄 Try Again</a>
                    <a href="history.html" class="btn btn-outline-light">📊 View History</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const dataStr = localStorage.getItem('diabetes_result');
            const container = document.getElementById('resultContainer');

            if (!dataStr) {
                container.innerHTML = `
                    <h3 class="text-danger mb-3">⚠️ Error</h3>
                    <p>No prediction data found. Please go back and submit the form.</p>
                `;
                return;
            }

            const data = JSON.parse(dataStr);
            const isHighRisk = data.result.includes("High Risk");
            const riskClass = isHighRisk ? 'result-high' : 'result-low';
            const icon = isHighRisk ? '⚠️' : '✅';
            const badgeClass = isHighRisk ? 'badge-high' : 'badge-low';

            container.classList.add(riskClass);
            container.innerHTML = `
                <div class="mb-4 display-3">${icon}</div>
                <h2 class="mb-2 ${isHighRisk ? 'text-danger' : 'text-success'}">${data.result}</h2>
                <div class="mb-4">
                    <span class="badge ${badgeClass} p-2 px-3 rounded-pill h5">
                        ${data.confidence}% Confidence
                    </span>
                </div>
                
                <hr class="my-4 opacity-10">
                
                <div class="text-start mb-4">
                    <h6 class="text-muted small text-uppercase fw-bold mb-3">Key Indicators Provided:</h6>
                    <div class="row g-2 small">
                        <div class="col-6">Glucose: <strong>${data.formData.glucose}</strong></div>
                        <div class="col-6">BMI: <strong>${data.formData.bmi}</strong></div>
                        <div class="col-6">Age: <strong>${data.formData.age}</strong></div>
                        <div class="col-6">Insulin: <strong>${data.formData.insulin}</strong></div>
                    </div>
                </div>

                <p class="text-muted small mt-4 italic">
                    *Disclaimer: This is an AI prediction and not a medical diagnosis. Consult a doctor for professional advice.
                </p>
            `;
        });
    </script>
</body>
</html>
