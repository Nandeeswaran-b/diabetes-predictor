<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction History - Diabetes Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-12 col-xl-10">
                <div class="glass-card animate-fade-in">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 class="title-gradient mb-0">📊 Prediction History</h2>
                        <a href="index.html" class="btn btn-sm btn-outline-light">🏠 Home</a>
                    </div>

                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Glucose</th>
                                    <th>BMI</th>
                                    <th>Age</th>
                                    <th>Result</th>
                                    <th>Confidence</th>
                                    <th>Timestamp</th>
                                </tr>
                            </thead>
                            <tbody id="historyTableBody">
                                <tr>
                                    <td colspan="7" class="text-center py-5">
                                        <div class="spinner-border text-primary" role="status"></div>
                                        <p class="mt-2 text-muted">Fetching history...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:5000' 
            : 'YOUR_RENDER_BACKEND_URL';

        async function fetchHistory() {
            const tbody = document.getElementById('historyTableBody');
            try {
                const response = await fetch(`${API_BASE_URL}/history`);
                const data = await response.json();

                if (!response.ok) throw new Error(data.error || 'Failed to fetch');

                if (data.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="text-center py-5 text-muted">No records found.</td></tr>';
                    return;
                }

                tbody.innerHTML = data.map(row => {
                    const isHigh = row.result.includes("High Risk");
                    const badgeClass = isHigh ? 'badge-high' : 'badge-low';
                    return `
                        <tr>
                            <td class="text-muted small">#${row.id}</td>
                            <td>${row.glucose}</td>
                            <td>${row.bmi}</td>
                            <td>${row.age}</td>
                            <td>
                                <span class="badge ${badgeClass} rounded-pill">
                                    ${row.result}
                                </span>
                            </td>
                            <td>${row.confidence}%</td>
                            <td class="text-muted small">${row.timestamp}</td>
                        </tr>
                    `;
                }).join('');

            } catch (error) {
                console.error('History fetch error:', error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center py-5 text-danger">
                            ⚠️ Error: ${error.message}<br>
                            <small class="text-muted">Ensure your backend is running and DATABASE_URL is set.</small>
                        </td>
                    </tr>
                `;
            }
        }

        fetchHistory();
    </script>
</body>
</html>
