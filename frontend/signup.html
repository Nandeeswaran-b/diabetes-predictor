<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Diabetes Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5">
                <div class="glass-card animate-fade-in text-center">
                    <h1 class="title-gradient h2 mb-4">Create Account</h1>
                    <p class="text-muted mb-4">Join us to start tracking your health data securely</p>

                    <form id="signupForm">
                        <div class="mb-3 text-start">
                            <label class="form-label">Email Address</label>
                            <input type="email" class="form-control" name="email" placeholder="name@example.com" required>
                        </div>
                        <div class="mb-3 text-start">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" placeholder="Min. 6 characters" required minlength="6">
                        </div>
                        <div class="mb-4 text-start">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" class="form-control" id="confirmPassword" placeholder="••••••••" required>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary" id="signupBtn">
                                <span>Register</span>
                                <div class="spinner-border text-light d-none" id="loader" role="status"></div>
                            </button>
                        </div>
                    </form>

                    <div class="mt-4">
                        <p class="text-muted small">Already have an account? <a href="login.html" class="text-accent text-decoration-none">Sign In</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('signupBtn');
            const loader = document.getElementById('loader');
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            if (data.password !== document.getElementById('confirmPassword').value) {
                alert('Passwords do not match!');
                return;
            }

            btn.disabled = true;
            loader.classList.remove('d-none');

            try {
                await Auth.signUp(data.email, data.password);
                alert('Account created! Please check your email or try signing in.');
                window.location.href = 'login.html';
            } catch (error) {
                alert('Signup Failed: ' + error.message);
            } finally {
                btn.disabled = false;
                loader.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
