<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏥 Diabetes Risk Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="glass-card animate-fade-in">
                    <div class="d-flex justify-content-between align-items-center mb-5">
                        <h1 class="title-gradient h2 mb-0">🏥 Diabetes Risk Predictor</h1>
                        <button onclick="Auth.signOut()" class="btn btn-sm btn-outline-light">Logout</button>
                    </div>

                    <form id="predictorForm">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Pregnancies</label>
                                <input type="number" class="form-control" name="pregnancies" placeholder="0-20" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Glucose</label>
                                <input type="number" class="form-control" name="glucose" placeholder="0-300 mg/dL" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Blood Pressure</label>
                                <input type="number" class="form-control" name="blood_pressure" placeholder="0-150 mmHg" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Skin Thickness</label>
                                <input type="number" class="form-control" name="skin_thickness" placeholder="0-100 mm" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Insulin</label>
                                <input type="number" class="form-control" name="insulin" placeholder="0-900 mIU/L" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">BMI</label>
                                <input type="number" step="0.1" class="form-control" name="bmi" placeholder="0-70 kg/m²" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Pedigree Function</label>
                                <input type="number" step="0.001" class="form-control" name="diabetes_pedigree" placeholder="0.0-2.5" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Age</label>
                                <input type="number" class="form-control" name="age" placeholder="21-100 years" required>
                            </div>
                        </div>

                        <div class="d-grid mt-5">
                            <button type="submit" class="btn btn-primary d-flex align-items-center justify-content-center gap-2" id="submitBtn">
                                <span>Analyze Personal Data</span>
                                <div class="spinner-border text-light d-none" id="loadingSpinner" role="status"></div>
                            </button>
                        </div>
                    </form>

                    <div class="text-center mt-4">
                        <a href="history.html" class="text-decoration-none text-muted small hover-accent">📊 View Prediction History</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="auth.js"></script>
    <script>
        const API_BASE_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
            ? 'http://localhost:5000' 
            : 'https://diabetes-predictor-4geq.onrender.com'; // Replace this after deployment

        document.getElementById('predictorForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const spinner = document.getElementById('loadingSpinner');
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());

            // Add User ID
            const userId = await Auth.getUserId();
            data.user_id = userId;

            // UI Feedback
            submitBtn.disabled = true;
            spinner.classList.remove('d-none');

            try {
                const response = await fetch(`${API_BASE_URL}/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                const result = await response.json();
                
                if (response.ok) {
                    // Save to localStorage for result.html
                    localStorage.setItem('diabetes_result', JSON.stringify({
                        ...result,
                        formData: data
                    }));
                    window.location.href = 'result.html';
                } else {
                    alert('Error: ' + (result.error || 'Something went wrong'));
                }
            } catch (error) {
                console.error('Fetch error:', error);
                alert('Connection error. Is the backend running?');
            } finally {
                submitBtn.disabled = false;
                spinner.classList.add('d-none');
            }
        });
    </script>
</body>
</html>
